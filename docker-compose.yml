# docker-compose for the ai-genre-pipeline.
#
#   Orchestrator only (cloud backends):
#     docker compose run --rm orchestrator run
#
#   With local ComfyUI for high-consistency visuals:
#     docker compose --profile local up -d comfyui
#     docker compose run --rm orchestrator run
#
# All tunables live in .env (see .env.example).

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-genre-pipeline:latest
    env_file:
      - .env
    volumes:
      # Durable, Docker-managed data volume for ALL generated content
      # (music, scenes, final videos, stream segments, manifests, state).
      # Survives `docker compose down`, image rebuilds and container recreation,
      # so nothing generated is ever lost. Removed only by an explicit
      # `docker compose down -v` or `docker volume rm`.
      - agp_outputs:/app/outputs
      #
      # Prefer the files directly on the host (easier to grab finished videos)?
      # Comment the line above and uncomment this bind mount instead:
      # - ./outputs:/app/outputs
      #
      # "git pull and run" workflow: mount the source so pulled code changes take
      # effect WITHOUT rebuilding the image (the image bakes app/ in at build time,
      # so otherwise you must `docker compose build` after every pull). You still
      # need to rebuild when requirements.txt changes. Uncomment to enable:
      # - ./app:/app/app:ro
    # When COMFYUI_URL points at the bundled service below, this lets the
    # orchestrator reach it by service name without host networking.
    networks:
      - agp
    # The orchestrator is a batch job, not a long-running server.
    restart: "no"

  # ---------------------------------------------------------------------------
  # Optional local visual backend. Enabled only with `--profile local`.
  # Requires an NVIDIA GPU + nvidia-container-toolkit on the host.
  # Set IMAGE_BACKEND=comfyui / VIDEO_BACKEND=comfyui and
  # COMFYUI_URL=http://comfyui:8188 in .env to use it.
  # ---------------------------------------------------------------------------
  comfyui:
    image: yanwk/comfyui-boot:latest
    profiles: ["local"]
    ports:
      - "8188:8188"
    volumes:
      - ./comfyui/models:/root/ComfyUI/models
      - ./comfyui/input:/root/ComfyUI/input
      - ./comfyui/output:/root/ComfyUI/output
    networks:
      - agp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  # Named data volume holding every run's output. Docker stores it under its own
  # managed area; back it up or browse it with the commands in the README.
  agp_outputs:
    # To pin the volume to a specific host directory (e.g. a big disk on the NUC),
    # uncomment and set `device` — content then lives there but stays a managed
    # volume that survives container/image lifecycle:
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /srv/ai-genre-pipeline/outputs

networks:
  agp:
    driver: bridge
